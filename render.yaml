services:
  - type: web
    name: bajet-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DB_PATH
        value: /data/bajet.db
      - key: GOOGLE_CLIENT_ID
        sync: false
    disk:
      name: bajet-data
      mountPath: /data
      sizeGB: 1
